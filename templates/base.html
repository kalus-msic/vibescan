<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Vibescan{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <style>* { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<nav class="bg-white border-b border-slate-200 px-6 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto flex items-center justify-between h-14">
    <a href="{% url 'scanner:home' %}" class="flex items-center gap-2">
      <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
      <span class="font-bold text-lg tracking-tight">vibescan</span>
      <span class="text-xs bg-blue-50 text-blue-600 border border-blue-200 px-2 py-0.5 rounded-full font-medium">beta</span>
    </a>
    <div class="flex items-center gap-5 text-sm">
      <a href="{% url 'pages:how_it_works' %}" class="text-slate-500 hover:text-slate-900 font-medium transition-colors">Jak to funguje</a>
      <a href="{% url 'pages:guide' %}" class="text-slate-500 hover:text-slate-900 font-medium transition-colors">Průvodce</a>
    </div>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer class="border-t border-slate-200 bg-white px-6 py-6 mt-16">
  <div class="max-w-5xl mx-auto text-center text-sm text-slate-400">
    vibescan — bezpečnostní audit pro vibecoded projekty
  </div>
</footer>

<script>
// Ensure HTMX processes elements after page load (fixes bfcache/redirect issues)
document.addEventListener("DOMContentLoaded", function() {
  if (typeof htmx !== "undefined") {
    htmx.process(document.body);
  }
});
// Also handle bfcache restore (back/forward navigation)
window.addEventListener("pageshow", function(event) {
  if (event.persisted && typeof htmx !== "undefined") {
    htmx.process(document.body);
  }
});
</script>
</body>
</html>
