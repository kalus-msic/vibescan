{% extends "base.html" %}
{% block title %}Sken — {{ scan.url }}{% endblock %}

{% block content %}
<section class="max-w-5xl mx-auto px-6 py-20">
  <div class="max-w-3xl mx-auto">
    <div class="text-center mb-8">
      <div class="text-xs text-slate-400 font-mono mb-3">vibescan.io/scan/{{ scan.id }}</div>
      <h2 class="text-2xl font-bold">
        {% if scan.status == "done" %}Výsledky pro{% else %}Skenuji{% endif %}
        <span class="text-blue-600">{{ scan.url }}</span>
      </h2>
    </div>

    <div id="scan-content"
      hx-get="{% url 'scanner:scan_status' scan.id %}"
      hx-trigger="{% if scan.status != 'done' and scan.status != 'failed' %}every 2s{% endif %}"
      hx-swap="outerHTML">
      {% include "scanner/partials/progress.html" %}
    </div>
  </div>
</section>
{% endblock %}
