<div id="scan-content" class="bg-white border border-red-200 rounded-2xl p-8 text-center shadow-sm">
  <div class="text-red-500 font-bold text-lg mb-2">Sken selhal</div>
  <p class="text-slate-500 text-sm mb-4">{{ scan.error_message }}</p>
  <div class="flex items-center justify-center gap-3">
    <form method="post" action="{% url 'scanner:scan_rescan' scan.id %}">
      {% csrf_token %}
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition-colors cursor-pointer">Zkusit znovu</button>
    </form>
    <a href="{% url 'scanner:home' %}" class="text-slate-500 hover:text-slate-900 font-medium text-sm transition-colors">Nový sken</a>
  </div>
</div>
