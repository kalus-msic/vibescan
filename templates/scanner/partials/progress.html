<div id="scan-content"
  hx-get="{% url 'scanner:scan_status' scan.id %}"
  hx-trigger="every 2s"
  hx-swap="outerHTML">

  <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
    {% for step in scan.progress %}
    <div class="flex items-center gap-3 px-5 py-4 {% if not forloop.last %}border-b border-slate-100{% endif %}
      {% if step.status == 'running' %}bg-blue-50/40{% endif %}
      {% if step.status == 'pending' %}opacity-40{% endif %}">

      {% if step.status == 'done' %}
        <div class="w-4 h-4 rounded-full bg-green-500 flex items-center justify-center flex-shrink-0">
          <svg class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <span class="text-sm font-medium flex-1">{{ step.label }}</span>
        <span class="text-xs text-green-600 font-semibold">dokončeno</span>
      {% elif step.status == 'running' %}
        <div class="w-4 h-4 rounded-full border-2 border-blue-500 flex-shrink-0 animate-pulse"></div>
        <span class="text-sm font-medium flex-1 text-blue-700">{{ step.label }}</span>
        <span class="text-xs text-blue-600 font-semibold">probíhá…</span>
      {% else %}
        <div class="w-4 h-4 rounded-full border-2 border-slate-300 flex-shrink-0"></div>
        <span class="text-sm font-medium flex-1">{{ step.label }}</span>
        <span class="text-xs text-slate-400">čeká</span>
      {% endif %}
    </div>
    {% empty %}
    <div class="px-5 py-8 text-center text-slate-400 text-sm">Spouštím sken…</div>
    {% endfor %}
  </div>
</div>
